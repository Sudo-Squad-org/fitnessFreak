services:

  # Databases
  auth-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  booking-db:
    image: postgres:15
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  workout-db:
    image: postgres:15
    environment:
      POSTGRES_DB: workout_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  nutrition-db:
    image: postgres:15
    environment:
      POSTGRES_DB: nutrition_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  # Backend services
  auth-service:
    build: ./auth-service
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me-in-production}
      NOTIFICATIONS_URL: http://notifications-service:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@auth-db:5432/auth_db
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}

  booking-service:
    build: ./booking-service
    depends_on:
      booking-db:
        condition: service_healthy
    ports:
      - "8002:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@booking-db:5432/booking_db

  workout-service:
    build: ./workout-service
    depends_on:
      workout-db:
        condition: service_healthy
    ports:
      - "8003:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@workout-db:5432/workout_db

  nutrition-service:
    build: ./nutrition-service
    depends_on:
      nutrition-db:
        condition: service_healthy
    ports:
      - "8004:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@nutrition-db:5432/nutrition_db

  goals-db:
    image: postgres:15
    environment:
      POSTGRES_DB: goals_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5437:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  progress-db:
    image: postgres:15
    environment:
      POSTGRES_DB: progress_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5438:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  notifications-db:
    image: postgres:15
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5439:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  goals-service:
    build: ./goals-service
    depends_on:
      goals-db:
        condition: service_healthy
    ports:
      - "8005:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@goals-db:5432/goals_db

  progress-service:
    build: ./progress-service
    depends_on:
      progress-db:
        condition: service_healthy
    ports:
      - "8006:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@progress-db:5432/progress_db

  notifications-service:
    build: ./notifications-service
    depends_on:
      notifications-db:
        condition: service_healthy
    ports:
      - "8007:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@notifications-db:5432/notifications_db

  health-db:
    image: postgres:15
    environment:
      POSTGRES_DB: health_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5440:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  health-service:
    build: ./health-service
    depends_on:
      health-db:
        condition: service_healthy
    ports:
      - "8008:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@health-db:5432/health_db

  community-db:
    image: postgres:15
    environment:
      POSTGRES_DB: community_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      retries: 10

  community-service:
    build: ./community-service
    depends_on:
      community-db:
        condition: service_healthy
    ports:
      - "8009:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@community-db:5432/community_db
      NOTIFICATIONS_URL: http://notifications-service:8000
      WORKOUT_URL: http://workout-service:8000
      HEALTH_URL: http://health-service:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}

  # API Gateway
  gateway:
    build: ./api-gateway
    depends_on:
      - auth-service
      - booking-service
      - workout-service
      - nutrition-service
      - goals-service
      - progress-service
      - notifications-service
      - health-service
      - community-service
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - gateway
